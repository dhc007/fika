<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fika Coffee Co. — Panjim, Goa</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream: #F5F0E8;
    --warm-white: #FAF8F3;
    --espresso: #2C1810;
    --mocha: #5C3D2E;
    --caramel: #C4956A;
    --sage: #8A9E7E;
    --mist: #D6D0C4;
    --gold: #B8955A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { background: var(--cream); color: var(--espresso); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.5rem 4rem;
    background: rgba(245,240,232,0.94);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(184,149,90,0.15);
  }
  .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 300; letter-spacing: 0.12em; color: var(--espresso); text-decoration: none; }
  .nav-logo span { color: var(--gold); font-style: italic; }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; }
  .nav-links a { font-size: 0.78rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--mocha); text-decoration: none; transition: color 0.3s; }
  .nav-links a:hover { color: var(--gold); }
  .nav-cta { background: var(--espresso); color: var(--cream) !important; padding: 0.6rem 1.4rem; border-radius: 2px; transition: background 0.3s !important; }
  .nav-cta:hover { background: var(--mocha) !important; }

  /* HERO */
  .hero { min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; padding-top: 80px; overflow: hidden; }
  .hero-left { display: flex; flex-direction: column; justify-content: center; padding: 6rem 4rem 6rem 6rem; }
  .hero-eyebrow { font-size: 0.72rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); font-weight: 500; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.8rem; }
  .hero-eyebrow::before { content: ''; width: 30px; height: 1px; background: var(--gold); }
  .hero-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(3.5rem, 6vw, 5.5rem); font-weight: 300; line-height: 1.08; margin-bottom: 1.5rem; }
  .hero-title em { font-style: italic; color: var(--mocha); }
  .hero-sub { font-size: 1rem; color: var(--mocha); font-weight: 300; line-height: 1.8; max-width: 400px; margin-bottom: 3rem; }
  .hero-actions { display: flex; gap: 1rem; align-items: center; }
  .btn-primary { background: var(--espresso); color: var(--cream); padding: 1rem 2.2rem; font-size: 0.78rem; letter-spacing: 0.15em; text-transform: uppercase; text-decoration: none; border-radius: 2px; transition: background 0.3s, transform 0.2s; }
  .btn-primary:hover { background: var(--mocha); transform: translateY(-1px); }
  .btn-ghost { color: var(--espresso); font-size: 0.78rem; letter-spacing: 0.15em; text-transform: uppercase; text-decoration: none; display: flex; align-items: center; gap: 0.5rem; transition: color 0.3s; }
  .btn-ghost:hover { color: var(--gold); }
  .btn-ghost::after { content: '→'; font-size: 1rem; }

  .hero-right { position: relative; overflow: hidden; background: var(--mocha); }
  .hero-img-grid { display: grid; grid-template-rows: 1fr 1fr; height: 100%; gap: 3px; }
  .hero-img-grid > div { overflow: hidden; }
  .hero-img-grid img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s ease; }
  .hero-img-grid img:hover { transform: scale(1.04); }

  .hero-badge {
    position: absolute; bottom: 3rem; left: -1rem;
    background: var(--warm-white); border: 1px solid var(--mist);
    padding: 1.2rem 1.5rem; border-radius: 4px;
    box-shadow: 0 8px 32px rgba(44,24,16,0.15); z-index: 10;
  }
  .hero-badge-stars { color: var(--gold); font-size: 0.9rem; margin-bottom: 0.3rem; }
  .hero-badge-num { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 300; color: var(--espresso); line-height: 1; }
  .hero-badge-label { font-size: 0.68rem; letter-spacing: 0.1em; color: var(--mocha); text-transform: uppercase; }

  /* ABOUT */
  .about-strip { background: var(--espresso); padding: 5rem 6rem; display: grid; grid-template-columns: 1fr 2fr; gap: 6rem; align-items: center; }
  .about-label { font-family: 'Cormorant Garamond', serif; font-size: 3rem; font-weight: 300; color: var(--caramel); line-height: 1.1; font-style: italic; }
  .about-content { color: rgba(245,240,232,0.75); font-size: 1rem; line-height: 1.9; font-weight: 300; }
  .about-content p + p { margin-top: 1rem; }
  .about-tags { display: flex; gap: 0.8rem; margin-top: 2rem; flex-wrap: wrap; }
  .tag { border: 1px solid rgba(196,149,106,0.4); color: var(--caramel); padding: 0.4rem 1rem; font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; border-radius: 100px; }

  /* MENU */
  .menu-section { padding: 7rem 6rem; }
  .section-header { display: flex; align-items: baseline; gap: 2rem; margin-bottom: 4rem; }
  .section-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.5rem, 4vw, 3.5rem); font-weight: 300; color: var(--espresso); }
  .section-title em { font-style: italic; color: var(--gold); }
  .section-line { flex: 1; height: 1px; background: var(--mist); }
  .section-tag { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); font-weight: 500; }
  .menu-tabs { display: flex; gap: 0; margin-bottom: 3rem; border-bottom: 1px solid var(--mist); flex-wrap: wrap; }
  .menu-tab { padding: 0.8rem 1.5rem; font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; border: none; background: none; cursor: pointer; color: var(--mocha); font-family: 'DM Sans', sans-serif; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.3s; font-weight: 400; }
  .menu-tab.active { color: var(--espresso); border-bottom-color: var(--gold); }
  .menu-tab:hover { color: var(--espresso); }
  .menu-panel { display: none; }
  .menu-panel.active { display: block; }
  .menu-category-title { font-family: 'Cormorant Garamond', serif; font-size: 0.8rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); font-weight: 400; margin: 2.5rem 0 1rem; }
  .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 0; }
  .menu-item { display: flex; justify-content: space-between; align-items: baseline; padding: 0.9rem 0; border-bottom: 1px solid rgba(196,149,106,0.12); transition: padding-left 0.2s; }
  .menu-item:hover { padding-left: 0.5rem; }
  .menu-item-name { font-size: 0.9rem; font-weight: 400; color: var(--espresso); }
  .menu-item-note { font-size: 0.72rem; color: var(--mocha); font-style: italic; margin-top: 0.1rem; }
  .menu-item-price { font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: var(--gold); white-space: nowrap; margin-left: 1rem; }

  /* GALLERY */
  .gallery-section { padding: 5rem 0; background: var(--warm-white); }
  .gallery-header { padding: 0 6rem 3rem; }
  .gallery-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; grid-template-rows: 280px 280px; gap: 3px; }
  .gallery-item { overflow: hidden; position: relative; cursor: pointer; background: var(--mist); }
  .gallery-item:first-child { grid-row: span 2; }
  .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; display: block; }
  .gallery-item:hover img { transform: scale(1.06); }
  .gallery-overlay { position: absolute; inset: 0; background: rgba(44,24,16,0); transition: background 0.4s; display: flex; align-items: flex-end; padding: 1.5rem; }
  .gallery-item:hover .gallery-overlay { background: rgba(44,24,16,0.25); }
  .gallery-label { color: var(--cream); font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0; transition: opacity 0.4s; font-weight: 500; }
  .gallery-item:hover .gallery-label { opacity: 1; }

  /* SPECIALS */
  .specials-section { padding: 7rem 6rem; display: grid; grid-template-columns: 1fr 1fr; gap: 6rem; align-items: center; }
  .specials-text .pre-label { font-size: 0.72rem; letter-spacing: 0.3em; color: var(--gold); text-transform: uppercase; margin-bottom: 1rem; }
  .specials-text h2 { font-family: 'Cormorant Garamond', serif; font-size: 3rem; font-weight: 300; line-height: 1.1; margin-bottom: 1.5rem; }
  .specials-text h2 em { font-style: italic; color: var(--mocha); }
  .specials-text p { color: var(--mocha); line-height: 1.8; font-size: 0.95rem; margin-bottom: 2rem; }
  .specials-list { list-style: none; }
  .specials-list li { display: flex; justify-content: space-between; padding: 1rem 0; border-bottom: 1px solid var(--mist); font-size: 0.9rem; }
  .specials-list li span:last-child { color: var(--gold); font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; }
  .specials-img { aspect-ratio: 3/4; border-radius: 3px; overflow: hidden; }
  .specials-img img { width: 100%; height: 100%; object-fit: cover; }

  /* REVIEWS */
  .reviews-section { background: var(--espresso); padding: 7rem 6rem; }
  .reviews-section .section-title { color: var(--cream); }
  .reviews-section .section-title em { color: var(--caramel); }
  .reviews-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-top: 4rem; }
  .review-card { background: rgba(245,240,232,0.06); border: 1px solid rgba(245,240,232,0.1); padding: 2rem; border-radius: 3px; transition: background 0.3s; }
  .review-card:hover { background: rgba(245,240,232,0.1); }
  .review-stars { color: var(--caramel); font-size: 0.85rem; margin-bottom: 1rem; }
  .review-text { color: rgba(245,240,232,0.8); font-size: 0.9rem; line-height: 1.8; font-weight: 300; margin-bottom: 1.5rem; font-style: italic; }
  .review-author { font-size: 0.72rem; letter-spacing: 0.1em; color: var(--caramel); text-transform: uppercase; }

  /* INFO */
  .info-section { display: grid; grid-template-columns: 1fr 1fr; min-height: 500px; }
  .info-map { position: relative; overflow: hidden; min-height: 400px; }
  .info-map iframe { width: 100%; height: 100%; border: none; filter: grayscale(20%) sepia(8%); }
  .info-details { background: var(--warm-white); padding: 5rem; display: flex; flex-direction: column; justify-content: center; gap: 2.5rem; }
  .info-details h2 { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; font-weight: 300; }
  .info-details h2 em { font-style: italic; color: var(--gold); }
  .info-block h4 { font-size: 0.68rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.5rem; }
  .info-block p { font-size: 0.9rem; color: var(--mocha); line-height: 1.7; font-weight: 300; }
  .info-block a { color: var(--mocha); text-decoration: none; }
  .info-block a:hover { color: var(--gold); }
  .info-actions { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1rem; }
  .info-btn { padding: 0.8rem 1.5rem; font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; text-decoration: none; border-radius: 2px; transition: all 0.3s; border: 1px solid var(--espresso); color: var(--espresso); font-weight: 500; }
  .info-btn:hover { background: var(--espresso); color: var(--cream); }
  .info-btn.filled { background: var(--espresso); color: var(--cream); }
  .info-btn.filled:hover { background: var(--mocha); border-color: var(--mocha); }

  /* FOOTER */
  footer { background: var(--espresso); color: rgba(245,240,232,0.5); padding: 3rem 6rem; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid rgba(245,240,232,0.08); font-size: 0.75rem; letter-spacing: 0.1em; }
  footer .foot-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; color: var(--caramel); font-weight: 300; letter-spacing: 0.1em; }
  footer .foot-logo em { font-style: italic; }
  footer a { color: rgba(245,240,232,0.5); text-decoration: none; }
  footer a:hover { color: var(--caramel); }

  /* ANIMATIONS */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  .hero-left > * { animation: fadeUp 0.8s ease forwards; opacity: 0; }
  .hero-left > *:nth-child(1) { animation-delay: 0.1s; }
  .hero-left > *:nth-child(2) { animation-delay: 0.25s; }
  .hero-left > *:nth-child(3) { animation-delay: 0.4s; }
  .hero-left > *:nth-child(4) { animation-delay: 0.55s; }

  .pet-badge { background: var(--sage); color: white; padding: 0.3rem 0.8rem; border-radius: 100px; font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; display: inline-flex; align-items: center; gap: 0.3rem; margin-bottom: 1rem; }

  /* MOBILE */
  @media (max-width: 900px) {
    nav { padding: 1.2rem 1.5rem; }
    .nav-links { display: none; }
    .hero { grid-template-columns: 1fr; }
    .hero-left { padding: 4rem 2rem 3rem; }
    .hero-right { min-height: 60vw; }
    .about-strip { grid-template-columns: 1fr; padding: 3rem 2rem; gap: 2rem; }
    .menu-section { padding: 4rem 2rem; }
    .gallery-grid { grid-template-columns: 1fr 1fr; grid-template-rows: auto; }
    .gallery-item:first-child { grid-row: span 1; grid-column: span 2; height: 240px; }
    .gallery-item { height: 180px; }
    .specials-section { grid-template-columns: 1fr; padding: 4rem 2rem; gap: 3rem; }
    .reviews-grid { grid-template-columns: 1fr; }
    .info-section { grid-template-columns: 1fr; }
    .info-map { min-height: 280px; }
    .info-details { padding: 3rem 2rem; }
    footer { flex-direction: column; gap: 1rem; padding: 2rem; text-align: center; }
    .gallery-header { padding: 0 2rem 2rem; }
    .reviews-section { padding: 4rem 2rem; }
  }
</style>
</head>

<nav>
  <a href="#" class="nav-logo">Fika <span>Coffee</span></a>

    <li><a href="#menu">Menu</a></li>

</nav>
